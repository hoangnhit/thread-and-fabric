kind = "web"
previewPath = "/"
title = "Tra Cứu Màu Chỉ Thêu Gingko"
version = "1.0.0"
id = "artifacts/thread-color"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20215
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/thread-color run dev"

[services.env]
PORT = "20215"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/thread-color", "run", "build"]
publicDir = "artifacts/thread-color/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
