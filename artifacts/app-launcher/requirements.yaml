packages:
  "framer-motion": "For fluid layout animations and spring-based interactions when filtering apps"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to smartly merge Tailwind classes without style conflicts"

images:
  - path: "artifacts/app-launcher/public/images/hero-bg.png"
    description: "Abstract 3D glassmorphism gradient background with vibrant purple, cyan, and soft pink hues, modern clean aesthetic, bright and welcoming"
    aspect_ratio: "16:9"

notes:
  - The application uses a hardcoded dataset of simulated web applications as requested.
  - Using Framer Motion for premium-feeling entry and hover animations.
  - The App.tsx utilizes Wouter for routing and TanStack query for simulating async data fetching.
